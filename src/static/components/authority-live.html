<!-- Map / Selector -->
<div class="lg:col-span-2 glass-card rounded-2xl p-6 space-y-5 flex flex-col">
    <div class="flex justify-between items-center">
        <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-video text-blue-500 mr-2"></i>Camera giám sát thực tế</h3>
        <div class="flex bg-slate-950/80 rounded-xl p-1 border border-white/5 text-xs font-semibold">
            <button onclick="togglePlayerMode('live')" id="btn-player-live" class="px-3 py-1.5 rounded-lg bg-blue-600 text-white">Luồng Gốc</button>
            <button onclick="togglePlayerMode('ai')" id="btn-player-ai" class="px-3 py-1.5 rounded-lg text-gray-400">AI HUD Overlay</button>
        </div>
    </div>

    <!-- Player container -->
    <div id="player-wrapper" class="relative w-full aspect-video rounded-xl overflow-hidden bg-black border border-white/5 flex items-center justify-center">
        <!-- Direct Iframe Player -->
        <iframe id="live-player-iframe" class="w-full h-full hidden" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        <!-- AI HUD overlay -->
        <div id="ai-hud-container" class="absolute inset-0 hidden pointer-events-none flex flex-col justify-between p-4">
            <div class="flex justify-between items-start">
                <span class="bg-red-600/90 text-white px-2 py-0.5 rounded text-[10px] uppercase font-bold animate-pulse tracking-widest"><i class="fa-solid fa-shield-halved mr-1"></i>AI HUD Active</span>
                <span class="bg-black/60 text-gray-300 px-2 py-0.5 rounded text-[10px] font-mono">1920x1080 @ 30FPS</span>
            </div>
            <!-- Mock bounding box drawings -->
            <div class="absolute border-2 border-green-500/80 rounded-lg p-2 flex flex-col" style="top:25%; left:30%; width:30%; height:45%;">
                <span class="text-green-400 text-[10px] font-bold bg-green-950/80 px-1 py-0.5 rounded -mt-6 ml-[-8px] border border-green-800/40 w-fit">VEHICLE #492: Mazda 3 (Sedan) [Conf: 94%]</span>
                <div class="border border-yellow-500/80 rounded mt-auto ml-[10%] w-[40%] h-[15%] flex">
                    <span class="text-yellow-400 text-[8px] font-bold bg-yellow-950/80 px-1 rounded -mt-4 ml-[-1px] border border-yellow-800/20 w-fit">PLATE: 30G-288.06 [LP:92% OCR:96%]</span>
                </div>
            </div>
        </div>
        <div id="player-placeholder" class="text-center space-y-2">
            <i class="fa-solid fa-video-slash text-4xl text-gray-600"></i>
            <p class="text-sm text-gray-500">Vui lòng chọn camera trên bản đồ để phát luồng</p>
        </div>
    </div>
</div>

<!-- Simulation & Control -->
<div class="glass-card rounded-2xl p-6 space-y-6 flex flex-col justify-between">
    <div>
        <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-sliders text-blue-500 mr-2"></i>Trình điều khiển giả lập</h3>
        
        <!-- Alert -->
        <div id="sim-alert" class="hidden p-3 rounded-lg text-xs mb-4"></div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Chọn Camera</label>
                <select id="sim-camera-id" class="w-full px-4 py-2.5 rounded-xl glass-input outline-none text-sm bg-slate-900">
                    <option value="1">Camera #01 (Camera cổng trường Nguyễn Huệ Đà Nẵng)</option>
                    <option value="2">Camera #02 (Camera cổng Sau bệnh viện C Đà Nẵng)</option>
                    <option value="3">Camera #03 (Trường Tiểu Học Lý Tự Trọng - PTZ)</option>
                    <option value="4">Camera #04 (TRƯỜNG LÝ TỰ TRỌNG - HƯỚNG KS SÔNG HÀ N - 12 Lý Tự Trọng)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Loại vi phạm mô phỏng</label>
                <select id="sim-violation-type" class="w-full px-4 py-2.5 rounded-xl glass-input outline-none text-sm bg-slate-900">
                    <option value="Đỗ xe đè vỉa hè">Đỗ xe đè vỉa hè (Sidewalk Parking)</option>
                    <option value="Đỗ tại khu vực cấm đỗ">Đỗ tại khu vực cấm đỗ (No Parking Area)</option>
                    <option value="Đỗ song song đỗ kép">Đỗ song song đỗ kép (Double Parking)</option>
                </select>
            </div>
        </div>
    </div>
    <button onclick="triggerSimulation()" class="w-full py-3.5 bg-red-600 hover:bg-red-500 text-white font-semibold text-sm rounded-xl shadow-lg shadow-red-900/30 flex justify-center items-center gap-2 mt-4">
        Kích hoạt sự cố mô phỏng <i class="fa-solid fa-bolt animate-bounce"></i>
    </button>
</div>
