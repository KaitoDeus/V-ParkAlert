<!-- Form Box -->
<div class="glass-card rounded-2xl p-6 space-y-5">
    <h3 class="text-lg font-bold text-white border-b border-white/5 pb-2"><i class="fa-solid fa-cloud-arrow-up text-blue-500 mr-2"></i>Khai báo vi phạm đỗ xe</h3>
    
    <!-- Alert Panel -->
    <div id="report-alert" class="hidden p-4 rounded-xl text-sm"></div>

    <!-- File Drag Drop Dropzone -->
    <div id="dropzone" class="border-2 border-dashed border-white/10 hover:border-blue-500 rounded-2xl p-8 flex flex-col items-center justify-center text-center cursor-pointer transition-all hover:bg-white/5 relative overflow-hidden h-[200px]">
        <input type="file" id="report-file" class="hidden" accept="image/*">
        
        <!-- Default placeholder -->
        <div id="dropzone-placeholder" class="space-y-3">
            <div class="w-12 h-12 rounded-full bg-slate-900/60 flex items-center justify-center text-blue-400 mx-auto border border-white/5">
                <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
            </div>
            <p class="text-sm font-semibold text-white">Kéo thả ảnh bằng chứng hoặc click để chọn tệp</p>
            <p class="text-xs text-gray-500">Hỗ trợ JPG, PNG, WEBP. Ảnh sẽ được quét AI tự động</p>
        </div>

        <!-- Scanning effect overlay -->
        <div id="scanning-overlay" class="hidden absolute inset-0 bg-slate-950/80 flex-col items-center justify-center p-4">
            <div class="w-full max-w-[200px] h-[180px] border border-blue-500/30 rounded-lg relative overflow-hidden flex items-center justify-center">
                <i class="fa-solid fa-robot text-4xl text-blue-500/20 animate-pulse"></i>
                <div class="scanning-line absolute top-0 left-0"></div>
            </div>
            <span class="text-sm font-semibold text-blue-400 mt-4 animate-pulse">AI đang phân tích ảnh bằng chứng...</span>
        </div>

        <!-- Image Preview -->
        <img id="image-preview" class="hidden absolute inset-0 w-full h-full object-cover">
    </div>

    <!-- Input Fields -->
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Biển số xe</label>
            <input type="text" id="report-plate" class="w-full px-4 py-2.5 rounded-xl glass-input outline-none text-sm font-mono tracking-wider font-bold" placeholder="30E-851.12">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Hành vi vi phạm</label>
            <select id="report-violation" class="w-full px-4 py-2.5 rounded-xl glass-input outline-none text-sm bg-slate-900">
                <option value="Đỗ xe đè vỉa hè">Đỗ xe đè vỉa hè</option>
                <option value="Đỗ tại khu vực cấm đỗ">Đỗ tại khu vực cấm đỗ</option>
                <option value="Đỗ song song đỗ kép">Đỗ song song đỗ kép</option>
            </select>
        </div>

        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Vĩ độ (Latitude)</label>
            <input type="number" step="any" id="report-lat" class="w-full px-4 py-2.5 rounded-xl glass-input outline-none text-sm" placeholder="10.7745" required>
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Kinh độ (Longitude)</label>
            <input type="number" step="any" id="report-lng" class="w-full px-4 py-2.5 rounded-xl glass-input outline-none text-sm" placeholder="106.7025" required>
        </div>
        <div class="col-span-2">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Mô tả thêm / Ghi chú</label>
            <textarea id="report-desc" rows="2" class="w-full px-4 py-2.5 rounded-xl glass-input outline-none text-sm" placeholder="Ghi chú vị trí hoặc mô tả chi tiết..."></textarea>
        </div>
    </div>
    <button onclick="submitReport()" class="w-full py-3.5 bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm rounded-xl shadow-lg shadow-blue-900/30 flex justify-center items-center gap-2">
        Gửi báo cáo vi phạm <i class="fa-solid fa-paper-plane"></i>
    </button>
</div>

<!-- Map Box -->
<div class="glass-card rounded-2xl p-6 space-y-4">
    <div class="flex justify-between items-center">
        <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-map-location-dot text-blue-500 mr-2"></i>Chọn vị trí trên bản đồ</h3>
        <span class="text-xs text-gray-400">Click bản đồ để tự động điền Kinh/Vĩ độ</span>
    </div>
    <div id="citizen-map" class="map-container"></div>
</div>
