<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-ParkAlert - Đăng nhập Hệ thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgb(4, 8, 20) 0%, rgb(10, 17, 40) 90.1%);
        }
        .glass-panel {
            background: rgba(13, 20, 48, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            border-color: rgb(59, 130, 246);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
        }
        .glow-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .glow-btn:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            transform: translateY(-1px);
        }

        /* Light Mode Styles for Login Page */
        body.light-mode {
            background: #f8fafc !important;
        }
        body.light-mode .bg-gradient-to-r {
            background: none !important;
            background-clip: unset !important;
            -webkit-background-clip: unset !important;
            color: #1e3a8a !important; /* Premium Solid Navy Blue */
        }
        body.light-mode .text-white {
            color: #0f172a !important;
        }
        body.light-mode .bg-blue-600,
        body.light-mode .bg-blue-500 {
            color: #ffffff !important;
        }
        body.light-mode .text-gray-300 {
            color: #1e293b !important;
        }
        body.light-mode .text-gray-400,
        body.light-mode .text-gray-500 {
            color: #475569 !important;
        }
        body.light-mode .glass-panel {
            background: rgba(255, 255, 255, 0.75) !important;
            border: 1px solid rgba(0, 0, 0, 0.08) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.08) !important;
        }
        body.light-mode .glass-input {
            background: rgba(0, 0, 0, 0.02) !important;
            border: 1px solid rgba(0, 0, 0, 0.12) !important;
            color: #0f172a !important;
        }
        body.light-mode .glass-input:focus {
            border-color: rgb(59, 130, 246) !important;
            background: rgba(0, 0, 0, 0.04) !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15) !important;
        }
        body.light-mode .border-white\/5 {
            border-color: rgba(0, 0, 0, 0.08) !important;
        }
        body.light-mode .bg-slate-900\/80 {
            background-color: rgba(241, 245, 249, 0.8) !important;
            color: #3b82f6 !important;
            border: 1px solid rgba(0, 0, 0, 0.06) !important;
        }
        body.light-mode .bg-slate-900\/80:hover {
            background-color: rgba(226, 232, 240, 0.9) !important;
        }
        body.light-mode #theme-toggle {
            background-color: rgba(255, 255, 255, 0.8) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
            color: #475569 !important;
        }
        body.light-mode #theme-toggle:hover {
            background-color: rgba(0, 0, 0, 0.05) !important;
            color: #0f172a !important;
        }
        body.light-mode .bg-green-950\/80 {
            background-color: #d1fae5 !important;
            color: #065f46 !important;
            border-color: #34d399 !important;
        }
        body.light-mode .bg-red-950\/80 {
            background-color: #fee2e2 !important;
            color: #991b1b !important;
            border-color: #f87171 !important;
        }
        body.light-mode .absolute.bg-blue-900\/20,
        body.light-mode .absolute.bg-indigo-900\/20 {
            background-color: rgba(59, 130, 246, 0.05) !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Theme Toggle Button -->
    <button id="theme-toggle" onclick="toggleTheme()" class="absolute top-4 right-4 w-10 h-10 rounded-xl flex items-center justify-center bg-slate-900/60 border border-white/5 hover:bg-slate-800/80 text-gray-400 hover:text-white transition-all shadow-lg z-20" title="Chuyển đổi giao diện">
        <i class="fa-solid fa-moon text-sm" id="theme-icon"></i>
    </button>

    <!-- Decorative background blobs -->
    <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-blue-900/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[45vw] h-[45vw] bg-indigo-900/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-[480px] glass-panel rounded-3xl p-8 relative z-10">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="flex items-center gap-2">
                <span class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-300 to-purple-400 bg-clip-text text-transparent">V-ParkAlert</span>
            </div>
            <p class="text-gray-400 text-sm mt-2 text-center">Hệ thống giám sát và báo cáo vi phạm đỗ xe thông minh ứng dụng AI</p>
        </div>

        <!-- Alert Message -->
        <div id="alert-box" class="hidden p-4 rounded-xl mb-6 text-sm flex items-center gap-2"></div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-gray-300 text-xs font-semibold uppercase tracking-wider mb-2">Tên tài khoản</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-500"><i class="fa-regular fa-user"></i></span>
                    <input type="text" id="login-username" class="w-full py-3 pl-11 pr-4 rounded-xl glass-input outline-none text-sm" placeholder="Nhập tên tài khoản..." required>
                </div>
            </div>
            <div>
                <label class="block text-gray-300 text-xs font-semibold uppercase tracking-wider mb-2">Mật khẩu</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-500"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="login-password" class="w-full py-3 pl-11 pr-4 rounded-xl glass-input outline-none text-sm" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="w-full py-3.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm glow-btn shadow-lg shadow-blue-900/30 flex justify-center items-center gap-2">
                Đăng Nhập <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <!-- Quick Access Accounts -->
        <div class="mt-8 pt-6 border-t border-white/5">
            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest text-center mb-3">Tự động điền tài khoản demo</h4>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="quickLogin('citizen')" class="py-2 px-1 text-center bg-slate-900/80 hover:bg-slate-800 text-blue-400 hover:text-blue-300 rounded-lg text-xs border border-white/5 transition-all">
                    <i class="fa-solid fa-house mb-1 block"></i> Cư dân
                </button>
                <button onclick="quickLogin('authority')" class="py-2 px-1 text-center bg-slate-900/80 hover:bg-slate-800 text-indigo-400 hover:text-indigo-300 rounded-lg text-xs border border-white/5 transition-all">
                    <i class="fa-solid fa-shield-halved mb-1 block"></i> Cảnh sát
                </button>
                <button onclick="quickLogin('ai_system')" class="py-2 px-1 text-center bg-slate-900/80 hover:bg-slate-800 text-purple-400 hover:text-purple-300 rounded-lg text-xs border border-white/5 transition-all">
                    <i class="fa-solid fa-robot mb-1 block"></i> AI System
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/v1';
        const loginForm = document.getElementById('login-form');

        // Alert helper
        const showAlert = (message, isSuccess = false) => {
            const alertBox = document.getElementById('alert-box');
            alertBox.classList.remove('hidden', 'bg-red-950/80', 'text-red-400', 'border-red-800', 'bg-green-950/80', 'text-green-400', 'border-green-800');
            if (isSuccess) {
                alertBox.classList.add('bg-green-950/80', 'text-green-400', 'border', 'border-green-800');
                alertBox.innerHTML = `<i class="fa-regular fa-circle-check"></i> <span>${message}</span>`;
            } else {
                alertBox.classList.add('bg-red-950/80', 'text-red-400', 'border', 'border-red-800');
                alertBox.innerHTML = `<i class="fa-regular fa-circle-xmark"></i> <span>${message}</span>`;
            }
            alertBox.classList.remove('hidden');
        };

        // Form Submit Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Sai tài khoản hoặc mật khẩu');
                }

                localStorage.setItem('token', data.access_token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('username', username);
                showAlert('Đăng nhập thành công! Đang chuyển hướng...', true);
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } catch (err) {
                showAlert(err.message);
            }
        });

        // Quick login triggers (only autofills form, does not auto-submit)
        window.quickLogin = (role) => {
            document.getElementById('login-username').value = role;
            document.getElementById('login-password').value = 'password123';
        };

        // If token already exists and valid, auto-redirect to dashboard
        window.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const res = await fetch(`${API_URL}/auth/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        window.location.href = '/';
                    } else {
                        const theme = localStorage.getItem('theme');
                        localStorage.clear();
                        if (theme) localStorage.setItem('theme', theme);
                    }
                } catch (e) {
                    const theme = localStorage.getItem('theme');
                    localStorage.clear();
                    if (theme) localStorage.setItem('theme', theme);
                }
            }
        });

        // Theme switching logic
        const toggleTheme = () => {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                themeIcon.className = 'fa-solid fa-moon text-sm';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-mode');
                themeIcon.className = 'fa-solid fa-sun text-sm';
                localStorage.setItem('theme', 'light');
            }
        };

        // Initialize Theme on load (default is light mode)
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            const themeIcon = document.getElementById('theme-icon');
            if (themeIcon) themeIcon.className = 'fa-solid fa-sun text-sm';
        } else {
            document.body.classList.remove('light-mode');
            const themeIcon = document.getElementById('theme-icon');
            if (themeIcon) themeIcon.className = 'fa-solid fa-moon text-sm';
        }
    </script>
</body>
</html>
